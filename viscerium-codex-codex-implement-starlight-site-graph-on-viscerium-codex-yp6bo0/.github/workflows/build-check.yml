name: Build check
on:
  pull_request:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: Site/package-lock.json
      - run: npm install
        working-directory: Site
      - run: npm run build
        working-directory: Site
