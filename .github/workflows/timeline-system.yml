name: Timeline system

on:
  push:
    branches:
      - main
      - codex/viscerium-timeline-system
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: |
            Site/package.json
            Tools/obsidian-viscerium-timelines/package.json

      - name: Install site dependencies
        working-directory: Site
        run: npm install --no-audit --no-fund

      - name: Run unit tests
        id: unit-tests
        working-directory: Site
        shell: bash
        run: |
          set +e
          npm run test:unit > "$RUNNER_TEMP/timeline-unit-tests.txt" 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report unit-test failure
        if: steps.unit-tests.outputs.status != '0' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          {
            echo '## Timeline unit tests failed'
            echo
            echo '```text'
            cat "$RUNNER_TEMP/timeline-unit-tests.txt"
            echo '```'
          } > "$RUNNER_TEMP/timeline-unit-comment.md"
          gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/timeline-unit-comment.md"

      - name: Stop after unit-test failure
        if: steps.unit-tests.outputs.status != '0'
        run: exit 1

      - name: Run timeline performance checks
        working-directory: Site
        run: npm run benchmark:timelines

      - name: Build static Codex
        working-directory: Site
        run: npm run build

      - name: Install Obsidian plugin dependencies
        working-directory: Tools/obsidian-viscerium-timelines
        run: npm install --no-audit --no-fund

      - name: Build Obsidian plugin
        working-directory: Tools/obsidian-viscerium-timelines
        run: npm run build
