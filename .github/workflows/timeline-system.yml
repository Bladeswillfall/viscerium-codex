name: Timeline system

on:
  push:
    branches:
      - main
      - codex/viscerium-timeline-system
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          show-progress: false
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: Site/package-lock.json

      - name: Install site dependencies
        working-directory: Site
        run: npm ci --no-audit --no-fund

      - name: Run unit tests
        id: unit-tests
        working-directory: Site
        shell: bash
        run: |
          set +e
          npm run test:unit > "$RUNNER_TEMP/timeline-unit-tests.txt" 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report unit-test failure
        if: steps.unit-tests.outputs.status != '0' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          {
            echo '## Timeline unit tests failed'
            echo
            echo '```text'
            cat "$RUNNER_TEMP/timeline-unit-tests.txt"
            echo '```'
          } > "$RUNNER_TEMP/timeline-unit-comment.md"
          gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/timeline-unit-comment.md"

      - name: Stop after unit-test failure
        if: steps.unit-tests.outputs.status != '0'
        run: exit 1

      - name: Run timeline performance checks
        working-directory: Site
        shell: bash
        run: npm run benchmark:timelines | tee "$RUNNER_TEMP/timeline-benchmark.txt"

      - name: Build static Codex
        working-directory: Site
        run: npm run build

      - name: Install Obsidian plugin dependencies
        working-directory: Tools/obsidian-viscerium-timelines
        run: npm install --package-lock=false --no-audit --no-fund

      - name: Build Obsidian plugin
        working-directory: Tools/obsidian-viscerium-timelines
        run: npm run build

      - name: Report verified performance
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          marker='<!-- timeline-performance -->'
          {
            echo "$marker"
            echo '## Timeline verification passed'
            echo
            echo 'Unit tests, static Astro build and Chronos-backed Obsidian plugin build passed on Node 24.'
            echo
            echo '### Synthetic compiler benchmark'
            echo
            echo '```json'
            grep '^{' "$RUNNER_TEMP/timeline-benchmark.txt"
            echo '```'
            echo
            echo "Verified commit: \`${GITHUB_SHA}\`"
          } > "$RUNNER_TEMP/timeline-performance-comment.md"

          existing_id="$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" --paginate --jq ".[] | select(.body | contains(\"$marker\")) | .id" | head -n 1)"
          if [ -n "$existing_id" ]; then
            jq -Rs '{body: .}' "$RUNNER_TEMP/timeline-performance-comment.md" > "$RUNNER_TEMP/timeline-performance-comment.json"
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$existing_id" --input "$RUNNER_TEMP/timeline-performance-comment.json" >/dev/null
          else
            gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/timeline-performance-comment.md"
          fi
