name: Patch timeline host scroll

on:
  push:
    branches:
      - codex/timeline-lane-scroll
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/timeline-lane-scroll
      - name: Move vertical scrolling to the timeline host
        run: |
          python - <<'PY'
          from pathlib import Path

          renderer = Path('Site/src/lib/timeline/chronos-native-renderer.mjs')
          text = renderer.read_text()
          old = "    maxHeight: options.compact ? '28rem' : '34rem',\n    minHeight: '20rem',"
          new = "    minHeight: '20rem',"
          if text.count(old) != 1:
              raise SystemExit('Expected exactly one timeline max-height option block')
          renderer.write_text(text.replace(old, new))

          styles = Path('Site/src/styles/timelines.css')
          text = styles.read_text()
          old = """.vc-timeline-canvas {
  min-height: 20rem;
  touch-action: pan-y pinch-zoom;
}
"""
          new = """.vc-timeline-canvas {
  min-height: 20rem;
  max-height: 34rem;
  overflow-x: hidden;
  overflow-y: auto;
  overscroll-behavior: contain;
  scrollbar-gutter: stable;
  touch-action: pan-y pinch-zoom;
}

.vc-timeline-app.is-compact .vc-timeline-canvas {
  max-height: 28rem;
}
"""
          if text.count(old) != 1:
              raise SystemExit('Expected exactly one timeline canvas style block')
          styles.write_text(text.replace(old, new))
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Site/src/lib/timeline/chronos-native-renderer.mjs Site/src/styles/timelines.css
          git commit -m "Scroll tall timeline lanes within the Chronos host"
          git push origin HEAD:codex/timeline-lane-scroll
