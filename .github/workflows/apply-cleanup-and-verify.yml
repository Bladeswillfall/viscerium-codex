name: Apply cleanup and verify

on:
  push:
    branches:
      - cleanup/reduce-custom-tools-and-deps
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: cleanup/reduce-custom-tools-and-deps
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Site/package-lock.json

      - name: Apply checked source transformations
        run: python .github/scripts/apply_cleanup.py

      - name: Regenerate lockfile
        working-directory: Site
        run: npm install

      - name: Run unit tests
        working-directory: Site
        run: npm run test:unit

      - name: Run full build
        working-directory: Site
        run: npm run build

      - name: Commit verified cleanup
        shell: bash
        run: |
          git rm --ignore-unmatch .github/scripts/apply_cleanup.py .github/workflows/apply-cleanup-and-verify.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -F - <<'EOF'
          Reduce custom tooling and unused dependencies

          - Remove 10 unused/redundant dependencies (xss, uuid, moment, vis-data,
            vis-util, @egjs/hammerjs, component-emitter, keycharm,
            propagating-hammerjs, fs-extra)
          - Replace fs-extra with node:fs/promises across all scripts
          - Extract shared utilities (cleanSlug, slugToRoute, escapeHtml, walk)
            into src/lib/codex-paths.mjs and scripts/lib/walk.mjs
          - De-duplicate these helpers from 8+ files that each had their own copy
          - Replace regex-based frontmatter parsing in sidebar.mjs with gray-matter
          - Make sync-public-notes.mjs import inferNoteType from note-inference.mjs
            instead of duplicating the typeByFolder map and inference logic
          - Delete materialize-degel-placeholders.mjs; the 6 WebP placeholder
            images already exist as committed files in public/assets/images/degel-system/
          - Standardize escapeHtml to use &#39; across all files
          EOF
          git push origin HEAD:cleanup/reduce-custom-tools-and-deps
