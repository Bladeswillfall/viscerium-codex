name: Capture unit test failure

on:
  push:
    branches: [fix/home-quick-actions-templater]

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Site/package-lock.json
      - name: Capture unit output
        working-directory: Site
        run: |
          npm ci --silent --no-audit --no-fund
          npm run test:unit > ../debug-unit.log 2>&1 || true
      - name: Commit captured output
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add debug-unit.log
          git commit -m 'debug: capture unit test output'
          git push origin HEAD:fix/home-quick-actions-templater
