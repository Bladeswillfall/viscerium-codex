name: Vault authoring migration

on:
  push:
    branches:
      - refactor/vault-authoring-architecture
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: refactor/vault-authoring-architecture
          fetch-depth: 0

      - name: Apply migration
        run: |
          python3 Tools/migrate-vault-authoring.py
          python3 Tools/migrate-vault-authoring-fix.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Site/package-lock.json

      - name: Install site dependencies
        working-directory: Site
        run: npm ci

      - name: Run vault doctor
        working-directory: Site
        run: npm run doctor:vault

      - name: Run test suite
        working-directory: Site
        run: |
          set +e
          npm test > ../migration-test.log 2>&1
          code=$?
          tail -n 220 ../migration-test.log
          exit $code

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-test-log
          path: migration-test.log
          if-no-files-found: ignore

      - name: Commit migration
        run: |
          set +e
          {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            if git diff --cached --quiet; then
              echo "No migration changes to commit."
              exit 0
            fi
            git commit -m "refactor: organize vault authoring architecture"
            git push origin HEAD:refactor/vault-authoring-architecture
          } > migration-git.log 2>&1
          code=$?
          cat migration-git.log
          exit $code

      - name: Upload git diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-git-log
          path: migration-git.log
          if-no-files-found: ignore
