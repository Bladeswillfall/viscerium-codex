name: Vault authoring cleanup

on:
  push:
    branches:
      - refactor/vault-authoring-architecture
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@v4
        with:
          ref: refactor/vault-authoring-architecture
          fetch-depth: 0

      - name: Apply cleanup
        run: python3 Tools/cleanup-vault-authoring.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Site/package-lock.json

      - name: Install site dependencies
        working-directory: Site
        run: npm ci

      - name: Run vault doctor
        working-directory: Site
        run: npm run doctor:vault

      - name: Run full test and build suite
        working-directory: Site
        run: npm test

      - name: Commit validated cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No cleanup changes to commit."
            exit 0
          fi
          git commit -m "refactor: finalize vault authoring architecture"
          git push origin HEAD:refactor/vault-authoring-architecture
