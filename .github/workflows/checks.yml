name: Checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: Site
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 500
          persist-credentials: false
          show-progress: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Site/package-lock.json

      - run: npm ci --silent --no-audit --no-fund
      - run: npm run test:unit
      - run: npm run benchmark:timelines
      - run: npm run build

      - name: Build Obsidian timeline plugin
        working-directory: Tools/obsidian-viscerium-timelines
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Install browser runtime
        run: |
          npm install --no-save --package-lock=false --legacy-peer-deps --no-audit --no-fund @playwright/test@1.55.0
          npx --no-install playwright install chromium

      - name: Start preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4321 > "$RUNNER_TEMP/viscerium-preview.log" 2>&1 &
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4321/eras/citadel/ > /dev/null && exit 0
            sleep 1
          done
          cat "$RUNNER_TEMP/viscerium-preview.log"
          exit 1

      - name: Run browser checks
        id: browser-checks
        continue-on-error: true
        run: npx --no-install playwright test tests/browser --reporter=line --workers=1 > "$RUNNER_TEMP/browser-checks.log" 2>&1
      - name: Upload failed browser-check log
        if: steps.browser-checks.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-check-log
          path: ${{ runner.temp }}/browser-checks.log
          retention-days: 1
      - name: Fail failed browser checks
        if: steps.browser-checks.outcome == 'failure'
        run: |
          tail -n 120 "$RUNNER_TEMP/browser-checks.log"
          exit 1
