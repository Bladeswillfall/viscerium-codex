name: Checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: Site
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 500
          persist-credentials: false
          show-progress: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Site/package-lock.json

      - run: npm ci --silent --no-audit --no-fund
      - run: npm run test:unit
      - run: npm run benchmark:timelines
      - run: npm run build

      - name: Build Obsidian timeline plugin
        working-directory: Tools/obsidian-viscerium-timelines
        run: |
          npm ci --no-audit --no-fund
          npm run build
          grep -q 'open-storyline-project-timeline' dist/main.js
          grep -q 'diagnose-storyline-integration' dist/main.js

      - name: Upload Obsidian timeline plugin bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: viscerium-timelines-plugin
          path: Tools/obsidian-viscerium-timelines/dist/
          if-no-files-found: error
          retention-days: 1

      - name: Install browser runtime
        run: |
          npm install --no-save --package-lock=false --legacy-peer-deps --no-audit --no-fund @playwright/test@1.55.0
          npx --no-install playwright install chromium

      - name: Start preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4321 > "$RUNNER_TEMP/viscerium-preview.log" 2>&1 &
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4321/eras/citadel/ > /dev/null && exit 0
            sleep 1
          done
          cat "$RUNNER_TEMP/viscerium-preview.log"
          exit 1

      - name: Run browser checks
        run: |
          set -o pipefail
          npx --no-install playwright test tests/browser --reporter=line --workers=1 2>&1 | tee "$RUNNER_TEMP/playwright.log"

      - name: Upload browser check log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: browser-check-log
          path: ${{ runner.temp }}/playwright.log
          if-no-files-found: warn
          retention-days: 1

  sync-local-plugin:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false
          show-progress: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Tools/obsidian-viscerium-timelines/package-lock.json

      - name: Build local timeline plugin
        working-directory: Tools/obsidian-viscerium-timelines
        run: |
          npm ci --no-audit --no-fund
          npm run build
          grep -q 'open-storyline-project-timeline' dist/main.js
          grep -q 'diagnose-storyline-integration' dist/main.js

      - name: Sync bundle into vault
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p Vault/.obsidian/plugins/viscerium-timelines
          cp Tools/obsidian-viscerium-timelines/dist/main.js Vault/.obsidian/plugins/viscerium-timelines/main.js
          cp Tools/obsidian-viscerium-timelines/dist/styles.css Vault/.obsidian/plugins/viscerium-timelines/styles.css
          cp Tools/obsidian-viscerium-timelines/dist/manifest.json Vault/.obsidian/plugins/viscerium-timelines/manifest.json

          git add Vault/.obsidian/plugins/viscerium-timelines/main.js \
                  Vault/.obsidian/plugins/viscerium-timelines/styles.css \
                  Vault/.obsidian/plugins/viscerium-timelines/manifest.json

          if git diff --cached --quiet; then
            echo 'VISCERIUM Timelines runtime is already synchronized.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'build: sync VISCERIUM Timelines runtime'
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
