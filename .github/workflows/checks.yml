name: Checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: Site
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 500
          persist-credentials: false
          show-progress: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Site/package-lock.json

      - run: npm ci --silent --no-audit --no-fund
      - run: npm run test:unit
      - run: npm run benchmark:timelines
      - name: Run build
        run: |
          if npm run build > "$RUNNER_TEMP/viscerium-build.log" 2>&1; then
            tail -40 "$RUNNER_TEMP/viscerium-build.log"
          else
            tail -160 "$RUNNER_TEMP/viscerium-build.log"
            exit 1
          fi
      - name: Upload failed build log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cheat-sheet-build-failure
          path: ${{ runner.temp }}/viscerium-build.log
          if-no-files-found: ignore

      - name: Build Obsidian timeline plugin
        working-directory: Tools/obsidian-viscerium-timelines
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Install browser runtime
        run: |
          npm install --no-save --package-lock=false --legacy-peer-deps --no-audit --no-fund @playwright/test@1.55.0
          npx --no-install playwright install chromium

      - name: Start preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4321 > "$RUNNER_TEMP/viscerium-preview.log" 2>&1 &
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4321/eras/citadel/ > /dev/null && exit 0
            sleep 1
          done
          cat "$RUNNER_TEMP/viscerium-preview.log"
          exit 1

      - name: Run browser checks
        run: npx --no-install playwright test tests/browser --reporter=line --workers=1
