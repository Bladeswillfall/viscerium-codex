name: Diagnose npm ci

on:
  push:
    branches:
      - feat/playform-compress
    paths:
      - .github/workflows/diagnose-npm-ci.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Capture npm ci output
        id: install
        continue-on-error: true
        run: |
          {
            node --version
            npm --version
            npm ci --no-audit --no-fund
          } > ../npm-ci-diagnostic.txt 2>&1
        working-directory: Site
      - name: Commit diagnostic
        if: steps.install.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add npm-ci-diagnostic.txt
          git commit -m "chore: capture npm ci diagnostic"
          git push
      - name: Fail after capture
        if: steps.install.outcome == 'failure'
        run: exit 1
