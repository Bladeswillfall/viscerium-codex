name: Diagnose PlayForm Compress

on:
  push:
    branches:
      - feat/playform-compress
    paths:
      - .github/workflows/diagnose-compress.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Site/package-lock.json
      - run: npm ci --silent --no-audit --no-fund
        working-directory: Site
      - name: Capture build result
        id: build
        continue-on-error: true
        run: npm run build > build.log 2>&1
        working-directory: Site
      - name: Commit diagnostic tail
        if: steps.build.outcome == 'failure'
        run: |
          tail -n 160 Site/build.log > compress-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add compress-diagnostic.txt
          git commit -m "chore: capture PlayForm build diagnostic"
          git push
      - name: Fail after capture
        if: steps.build.outcome == 'failure'
        run: exit 1
