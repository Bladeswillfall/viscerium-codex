name: Update timeline island lockfile

on:
  push:
    branches:
      - codex/timeline-controls-lifecycle

permissions:
  contents: write

jobs:
  update-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/timeline-controls-lifecycle
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Site/package-lock.json
      - name: Regenerate package lock
        working-directory: Site
        run: npm install --package-lock-only --legacy-peer-deps --ignore-scripts --no-audit --no-fund
      - name: Commit package lock
        run: |
          if git diff --quiet -- Site/package-lock.json; then
            echo "package-lock.json is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Site/package-lock.json
          git commit -m "Lock Preact timeline island dependencies"
          git push origin HEAD:codex/timeline-controls-lifecycle
