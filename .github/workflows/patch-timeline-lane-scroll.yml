name: Patch timeline lane scroll

on:
  push:
    branches:
      - codex/timeline-lane-scroll

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/timeline-lane-scroll
      - name: Apply lane scroll fix and regression coverage
        run: |
          python - <<'PY'
          from pathlib import Path

          renderer = Path('Site/src/lib/timeline/chronos-native-renderer.mjs')
          text = renderer.read_text()
          old = "    height: options.compact ? '28rem' : '34rem',\n    minHeight: '20rem',"
          new = "    maxHeight: options.compact ? '28rem' : '34rem',\n    minHeight: '20rem',"
          if text.count(old) != 1:
              raise SystemExit('Expected exactly one fixed-height timeline option block')
          renderer.write_text(text.replace(old, new))

          workflow = Path('.github/workflows/timeline-browser-smoke.yml')
          text = workflow.read_text()
          needle = "              if (era === 'smog') {"
          insertion = """              if (era === 'citadel') {
                const lane = page.locator('[data-vc-lane]');
                await lane.selectOption('lane');
                const scrollPanel = page.locator('[data-vc-canvas] .vis-panel.vis-left.vis-vertical-scroll');
                await expect(scrollPanel).toBeVisible();
                const scrollMetrics = await scrollPanel.evaluate((element) => ({
                  clientHeight: element.clientHeight,
                  scrollHeight: element.scrollHeight,
                }));
                expect(scrollMetrics.scrollHeight).toBeGreaterThan(scrollMetrics.clientHeight);
              }

              if (era === 'smog') {"""
          if text.count(needle) != 1:
              raise SystemExit('Expected exactly one SMOG interaction block')
          workflow.write_text(text.replace(needle, insertion))
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Site/src/lib/timeline/chronos-native-renderer.mjs .github/workflows/timeline-browser-smoke.yml
          git commit -m "Enable vertical scrolling for tall timeline lanes"
          git push origin HEAD:codex/timeline-lane-scroll
