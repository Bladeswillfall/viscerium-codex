name: Timeline browser smoke

on:
  push:
    branches:
      - codex/timeline-controls-lifecycle
  pull_request:
    paths:
      - 'Site/src/components/timeline/**'
      - 'Site/src/lib/timeline/**'
      - 'Site/src/styles/**'
      - 'Site/src/data/timelines/**'
      - 'Site/package.json'
      - 'Site/package-lock.json'
      - 'Site/astro.config.mjs'
      - '.github/workflows/timeline-browser-smoke.yml'

permissions:
  contents: read

jobs:
  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: Site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Site/package-lock.json
      - name: Install project dependencies
        run: npm ci --silent
      - name: Build static Codex
        run: npm run build
      - name: Install browser test runtime
        run: |
          npm install --no-save --legacy-peer-deps @playwright/test@1.55.0
          npx playwright install --with-deps chromium
      - name: Start Astro preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4321 > /tmp/viscerium-preview.log 2>&1 &
          echo $! > /tmp/viscerium-preview.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4321/eras/citadel/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/viscerium-preview.log
          exit 1
      - name: Run timeline browser smoke test
        run: |
          mkdir -p tests/browser
          cat > tests/browser/timeline-smoke.spec.mjs <<'TEST'
          import { mkdirSync, writeFileSync } from 'node:fs';
          import { test, expect } from '@playwright/test';

          const eras = ['citadel', 'smog', 'nearsight', 'entropy'];
          mkdirSync('timeline-browser-diagnostics', { recursive: true });

          async function collectErrors(page, era) {
            const messages = [];
            page.on('console', (message) => {
              const entry = `console:${message.type()}: ${message.text()}`;
              messages.push(entry);
              console.log(`[${era}] ${entry}`);
            });
            page.on('pageerror', (error) => {
              const entry = `pageerror: ${error.stack || error.message}`;
              messages.push(entry);
              console.log(`[${era}] ${entry}`);
            });
            page.on('requestfailed', (request) => {
              const entry = `requestfailed: ${request.url()} — ${request.failure()?.errorText}`;
              messages.push(entry);
              console.log(`[${era}] ${entry}`);
            });
            return messages;
          }

          async function openEra(page, era) {
            await page.goto(`http://127.0.0.1:4321/eras/${era}/`, { waitUntil: 'networkidle' });
            await page.waitForTimeout(3_000);
            await expect(page.locator('[data-vc-island-mounted="true"]')).toHaveCount(1, { timeout: 5_000 });
            await expect(page.locator('[data-vc-canvas]')).toBeVisible();
            await expect(page.locator('[data-vc-fallback]')).toBeHidden();
            await expect(page.locator('[data-vc-timeline-mount]')).not.toBeEmpty();
          }

          async function scrollBottomItemIntoView(page, item) {
            const scroll = await item.evaluate((element) => {
              const canvas = element.closest('[data-vc-canvas]');
              if (!canvas) return null;
              const canvasRect = canvas.getBoundingClientRect();
              const itemRect = element.getBoundingClientRect();
              const centred = canvas.scrollTop
                + itemRect.top
                - canvasRect.top
                - (canvas.clientHeight - itemRect.height) / 2;
              const maximum = Math.max(0, canvas.scrollHeight - canvas.clientHeight);
              const applied = Math.min(maximum, Math.max(0, centred + 128));
              canvas.scrollTop = applied;
              return {
                targetScrollTop: centred,
                appliedScrollTop: applied,
                maximumScrollTop: maximum,
                clientHeight: canvas.clientHeight,
                scrollHeight: canvas.scrollHeight,
              };
            });
            await page.locator('[data-vc-canvas]').scrollIntoViewIfNeeded();
            await page.waitForTimeout(350);
            const itemBox = await item.boundingBox();
            const canvasBox = await page.locator('[data-vc-canvas]').boundingBox();
            const viewport = page.viewportSize();
            return {
              ...scroll,
              itemBox,
              canvasBox,
              itemInCanvas: Boolean(itemBox && canvasBox
                && itemBox.y >= canvasBox.y
                && itemBox.y + itemBox.height <= canvasBox.y + canvasBox.height),
              itemInBrowser: Boolean(itemBox && viewport
                && itemBox.x >= 0
                && itemBox.y >= 0
                && itemBox.x + itemBox.width <= viewport.width
                && itemBox.y + itemBox.height <= viewport.height),
            };
          }

          for (const era of eras) {
            test(`${era} hydrates the Chronos timeline island`, async ({ page }) => {
              const messages = await collectErrors(page, era);
              await openEra(page, era);

              if (era === 'citadel') {
                await page.locator('[data-vc-lane]').selectOption('lane');
                await expect.poll(() => new URL(page.url()).searchParams.get('lane')).toBe('lane');
                await page.waitForTimeout(750);

                const metrics = await page.locator('[data-vc-canvas]').evaluate((canvas) => {
                  const timeline = canvas.querySelector('.vis-timeline');
                  const labels = [...canvas.querySelectorAll('.vis-labelset > .vis-label')]
                    .filter((element) => element.getClientRects().length > 0);
                  const events = [...canvas.querySelectorAll('.vis-item.vc-timeline-item')]
                    .filter((element) => element.getClientRects().length > 0);
                  const canvasStyle = getComputedStyle(canvas);
                  return {
                    canvasHeight: canvas.getBoundingClientRect().height,
                    clientHeight: canvas.clientHeight,
                    scrollHeight: canvas.scrollHeight,
                    overflowY: canvasStyle.overflowY,
                    timelineHeight: timeline?.getBoundingClientRect().height ?? 0,
                    labels: labels.map((element) => element.textContent?.trim() ?? ''),
                    events: events.map((element) => element.textContent?.trim() ?? ''),
                    labelMargins: labels.map((element) => {
                      const style = getComputedStyle(element);
                      return [style.marginTop, style.marginBottom];
                    }),
                  };
                });
                writeFileSync('timeline-browser-diagnostics/citadel-chronos-layout.json', JSON.stringify(metrics, null, 2));
                await page.screenshot({ path: 'timeline-browser-diagnostics/citadel-chronos-layout.png', fullPage: true });

                expect(metrics.canvasHeight).toBeLessThanOrEqual(674);
                expect(metrics.timelineHeight).toBeGreaterThan(320);
                expect(metrics.scrollHeight).toBeGreaterThan(metrics.clientHeight);
                expect(['auto', 'scroll']).toContain(metrics.overflowY);
                expect(metrics.labels).toContain('Veyr Court');
                expect(metrics.events.some((text) => text.includes('The Hollow Feast of Veyr'))).toBe(true);
                expect(metrics.labelMargins.every(([top, bottom]) => top === '0px' && bottom === '0px')).toBe(true);
              }

              if (era === 'smog') {
                const search = page.locator('[data-vc-search]');
                await search.fill('Black Furnace');
                await expect.poll(() => new URL(page.url()).searchParams.get('q')).toBe('Black Furnace');
                await page.locator('[data-vc-lane]').selectOption('category');
                await expect.poll(() => new URL(page.url()).searchParams.get('lane')).toBe('category');
                await page.locator('[data-vc-filters] summary').click();
                await page.locator('[data-vc-clear]').click();
                await expect(search).toHaveValue('');
              }

              if (era === 'entropy') {
                await page.locator('[data-vc-lane]').selectOption('lane');
                await expect.poll(() => new URL(page.url()).searchParams.get('lane')).toBe('lane');
                await page.waitForTimeout(750);

                const axis = await page.evaluate(() => {
                  const ruler = document.querySelector('[data-vc-axis]');
                  const center = document.querySelector('[data-vc-canvas] .vis-panel.vis-center');
                  const rulerRect = ruler?.getBoundingClientRect();
                  const centerRect = center?.getBoundingClientRect();
                  const ticks = [...(ruler?.querySelectorAll(':scope > span') ?? [])].map((tick) => {
                    const rect = tick.getBoundingClientRect();
                    const percent = Number(tick.dataset.vcAxisPercent);
                    const expected = (centerRect?.left ?? 0) + ((centerRect?.width ?? 0) * percent) / 100;
                    return { percent, error: Math.abs(rect.left + rect.width / 2 - expected) };
                  });
                  return {
                    rulerLeft: rulerRect?.left ?? 0,
                    centerLeft: centerRect?.left ?? 0,
                    ticks,
                  };
                });
                expect(axis.centerLeft).toBeGreaterThan(axis.rulerLeft);
                expect(axis.ticks.length).toBeGreaterThan(2);
                expect(axis.ticks.every(({ percent, error }) => Number.isFinite(percent) && error <= 2)).toBe(true);

                const pathfinder = page.locator('.vis-item.vc-timeline-item', { hasText: 'The Pathfinder Exodus' }).first();
                await expect(pathfinder).toBeAttached();
                const scroll = await scrollBottomItemIntoView(page, pathfinder);
                await page.evaluate(() => { document.documentElement.dataset.theme = 'dark'; });
                if (scroll.itemBox) {
                  await page.mouse.move(
                    scroll.itemBox.x + scroll.itemBox.width / 2,
                    scroll.itemBox.y + scroll.itemBox.height / 2,
                  );
                }
                await page.waitForTimeout(800);

                const tooltip = await page.evaluate(() => {
                  const item = [...document.querySelectorAll('.vis-item.vc-timeline-item')]
                    .find((element) => element.textContent?.includes('The Pathfinder Exodus'));
                  const visible = [...document.querySelectorAll('body > .vc-timeline-hovercard')]
                    .filter((element) => {
                      const style = getComputedStyle(element);
                      const rect = element.getBoundingClientRect();
                      return style.display !== 'none' && style.visibility !== 'hidden' && rect.width > 0 && rect.height > 0;
                    });
                  const card = visible[0];
                  const style = card ? getComputedStyle(card) : null;
                  return {
                    itemTitle: item?.getAttribute('title') ?? null,
                    count: visible.length,
                    text: visible.map((element) => element.textContent ?? '').join(' '),
                    background: style?.backgroundColor ?? null,
                    color: style?.color ?? null,
                  };
                });
                writeFileSync(
                  'timeline-browser-diagnostics/entropy-axis-tooltip.json',
                  JSON.stringify({ axis, scroll, tooltip }, null, 2),
                );
                await page.screenshot({ path: 'timeline-browser-diagnostics/entropy-axis-tooltip.png', fullPage: true });

                expect(scroll.scrollHeight).toBeGreaterThan(scroll.clientHeight);
                expect(scroll.itemInCanvas).toBe(true);
                expect(scroll.itemInBrowser).toBe(true);
                expect(tooltip.itemTitle).toBeNull();
                expect(tooltip.count).toBe(1);
                expect(tooltip.text).toContain('11,431');
                expect(tooltip.text).toContain('The Pathfinder Exodus');
                expect(tooltip.text).not.toMatch(/2030|2036/);
                expect(tooltip.background).toMatch(/21,\s*19,\s*16/);
                expect(tooltip.color).toMatch(/244,\s*239,\s*229/);
              }

              writeFileSync(
                `timeline-browser-diagnostics/${era}.json`,
                JSON.stringify({ messages, href: page.url() }, null, 2),
              );
              await page.screenshot({ path: `timeline-browser-diagnostics/${era}.png`, fullPage: true });
              expect(messages.filter((entry) => entry.startsWith('pageerror:'))).toEqual([]);
              expect(messages.filter((entry) => entry.includes('failed to mount'))).toEqual([]);
            });
          }
          TEST
          npx playwright test tests/browser/timeline-smoke.spec.mjs --reporter=line --workers=1
      - name: Show Astro preview log
        if: always()
        run: cat /tmp/viscerium-preview.log || true
      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: timeline-browser-smoke
          path: |
            Site/timeline-browser-diagnostics
            Site/test-results
          if-no-files-found: ignore
