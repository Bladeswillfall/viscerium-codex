name: Timeline browser smoke

on:
  push:
    branches:
      - codex/timeline-controls-lifecycle
  pull_request:
    paths:
      - 'Site/src/components/timeline/**'
      - 'Site/src/lib/timeline/**'
      - 'Site/src/styles/**'
      - 'Site/src/data/timelines/**'
      - 'Site/package.json'
      - 'Site/package-lock.json'
      - 'Site/astro.config.mjs'
      - '.github/workflows/timeline-browser-smoke.yml'

permissions:
  contents: read

jobs:
  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: Site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Site/package-lock.json
      - name: Install project dependencies
        run: npm ci --silent
      - name: Build static Codex
        run: npm run build
      - name: Install browser test runtime
        run: |
          npm install --no-save --legacy-peer-deps @playwright/test@1.55.0
          npx playwright install --with-deps chromium
      - name: Start Astro preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4321 > /tmp/viscerium-preview.log 2>&1 &
          echo $! > /tmp/viscerium-preview.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4321/eras/citadel/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/viscerium-preview.log
          exit 1
      - name: Run timeline browser smoke test
        run: |
          mkdir -p tests/browser
          cat > tests/browser/timeline-smoke.spec.mjs <<'TEST'
          import { mkdirSync, writeFileSync } from 'node:fs';
          import { test, expect } from '@playwright/test';

          const eras = ['citadel', 'smog', 'nearsight', 'entropy'];
          mkdirSync('timeline-browser-diagnostics', { recursive: true });

          async function scrollItemIntoTimelineViewport(locator) {
            const metrics = await locator.evaluate((item) => {
              const canvas = item.closest('[data-vc-canvas]');
              if (!canvas) return null;
              const canvasRect = canvas.getBoundingClientRect();
              const itemRect = item.getBoundingClientRect();
              const targetScrollTop = Math.max(
                0,
                canvas.scrollTop
                  + itemRect.top
                  - canvasRect.top
                  - (canvas.clientHeight - itemRect.height) / 2,
              );
              canvas.scrollTop = targetScrollTop;
              return {
                targetScrollTop,
                clientHeight: canvas.clientHeight,
                scrollHeight: canvas.scrollHeight,
              };
            });
            await locator.page().waitForTimeout(300);
            return metrics;
          }

          for (const era of eras) {
            test(`${era} hydrates the Chronos timeline island`, async ({ page }) => {
              const browserMessages = [];
              page.on('console', (message) => {
                const entry = `console:${message.type()}: ${message.text()}`;
                browserMessages.push(entry);
                console.log(`[${era}] ${entry}`);
              });
              page.on('pageerror', (error) => {
                const entry = `pageerror: ${error.stack || error.message}`;
                browserMessages.push(entry);
                console.log(`[${era}] ${entry}`);
              });
              page.on('requestfailed', (request) => {
                const entry = `requestfailed: ${request.url()} — ${request.failure()?.errorText}`;
                browserMessages.push(entry);
                console.log(`[${era}] ${entry}`);
              });

              await page.goto(`http://127.0.0.1:4321/eras/${era}/`, { waitUntil: 'networkidle' });
              await page.waitForTimeout(3_000);

              await expect(page.locator('[data-vc-island-mounted="true"]')).toHaveCount(1, { timeout: 5_000 });
              await expect(page.locator('[data-vc-canvas]')).toBeVisible();
              await expect(page.locator('[data-vc-fallback]')).toBeHidden();
              await expect(page.locator('[data-vc-timeline-mount]')).not.toBeEmpty();

              if (era === 'citadel') {
                const lane = page.locator('[data-vc-lane]');
                await lane.selectOption('lane');
                await expect.poll(() => new URL(page.url()).searchParams.get('lane')).toBe('lane');
                await page.waitForTimeout(750);

                const layoutMetrics = await page.locator('[data-vc-canvas]').evaluate((canvas) => {
                  const timeline = canvas.querySelector('.vis-timeline');
                  const content = canvas.querySelector('.vis-panel.vis-center > .vis-content');
                  const labels = [...canvas.querySelectorAll('.vis-labelset > .vis-label')]
                    .filter((element) => element.getClientRects().length > 0);
                  const namedLabels = labels.filter((element) => element.textContent?.trim());
                  const visibleEventItems = [...canvas.querySelectorAll(
                    '.vis-item.vis-box:not(.vis-background), .vis-item.vis-range:not(.vis-background), .vis-item.vis-point:not(.vis-background)',
                  )].filter((element) => element.getClientRects().length > 0);
                  const timelineRect = timeline?.getBoundingClientRect();
                  const canvasRect = canvas.getBoundingClientRect();
                  const canvasStyle = getComputedStyle(canvas);
                  const margins = labels.map((element) => {
                    const style = getComputedStyle(element);
                    return {
                      top: style.marginTop,
                      bottom: style.marginBottom,
                    };
                  });
                  const namedLabelBounds = namedLabels.map((element) => {
                    const rect = element.getBoundingClientRect();
                    return {
                      text: element.textContent?.trim() ?? '',
                      top: rect.top,
                      bottom: rect.bottom,
                    };
                  });
                  const eventBounds = visibleEventItems.map((element) => {
                    const rect = element.getBoundingClientRect();
                    return {
                      id: element.getAttribute('data-id'),
                      text: element.textContent?.trim() ?? '',
                      className: element.className,
                      top: rect.top,
                      bottom: rect.bottom,
                    };
                  });

                  return {
                    labelCount: labels.length,
                    namedLabelCount: namedLabels.length,
                    eventItemCount: visibleEventItems.length,
                    timelineHeight: timelineRect?.height ?? 0,
                    timelineTop: timelineRect?.top ?? 0,
                    timelineBottom: timelineRect?.bottom ?? 0,
                    canvasHeight: canvasRect.height,
                    canvasClientHeight: canvas.clientHeight,
                    canvasScrollHeight: canvas.scrollHeight,
                    canvasOverflowY: canvasStyle.overflowY,
                    contentTransform: content ? getComputedStyle(content).transform : null,
                    margins,
                    namedLabelBounds,
                    eventBounds,
                  };
                });
                writeFileSync(
                  'timeline-browser-diagnostics/citadel-chronos-layout.json',
                  JSON.stringify(layoutMetrics, null, 2),
                );
                await page.screenshot({ path: 'timeline-browser-diagnostics/citadel-chronos-layout.png', fullPage: true });

                expect(layoutMetrics.namedLabelCount).toBeGreaterThan(1);
                expect(layoutMetrics.eventItemCount).toBeGreaterThan(1);
                expect(layoutMetrics.timelineHeight).toBeGreaterThan(320);
                expect(layoutMetrics.canvasHeight).toBeLessThanOrEqual(674);
                expect(layoutMetrics.canvasScrollHeight).toBeGreaterThan(layoutMetrics.canvasClientHeight);
                expect(['auto', 'scroll']).toContain(layoutMetrics.canvasOverflowY);
                expect(layoutMetrics.margins.every(({ top, bottom }) => top === '0px' && bottom === '0px')).toBe(true);
                expect(layoutMetrics.namedLabelBounds.some(({ text }) => text === 'Veyr Court')).toBe(true);
                expect(layoutMetrics.eventBounds.some(({ text }) => text.includes('The Hollow Feast of Veyr'))).toBe(true);
                expect(layoutMetrics.namedLabelBounds.every(({ top, bottom }) => (
                  top >= layoutMetrics.timelineTop - 1 && bottom <= layoutMetrics.timelineBottom + 1
                ))).toBe(true);
                expect(layoutMetrics.eventBounds.every(({ top, bottom }) => (
                  top >= layoutMetrics.timelineTop - 2 && bottom <= layoutMetrics.timelineBottom + 2
                ))).toBe(true);
              }

              if (era === 'smog') {
                const search = page.locator('[data-vc-search]');
                const lane = page.locator('[data-vc-lane]');
                await search.fill('Black Furnace');
                await expect.poll(() => new URL(page.url()).searchParams.get('q')).toBe('Black Furnace');
                await lane.selectOption('category');
                await expect.poll(() => new URL(page.url()).searchParams.get('lane')).toBe('category');
                await page.locator('[data-vc-filters] summary').click();
                await page.locator('[data-vc-clear]').click();
                await expect(search).toHaveValue('');
                await expect.poll(() => new URL(page.url()).searchParams.get('q')).toBeNull();
              }

              if (era === 'entropy') {
                const lane = page.locator('[data-vc-lane]');
                await lane.selectOption('lane');
                await expect.poll(() => new URL(page.url()).searchParams.get('lane')).toBe('lane');
                await page.waitForTimeout(750);

                const axisMetrics = await page.evaluate(() => {
                  const axis = document.querySelector('[data-vc-axis]');
                  const center = document.querySelector('[data-vc-canvas] .vis-panel.vis-center');
                  const axisRect = axis?.getBoundingClientRect();
                  const centerRect = center?.getBoundingClientRect();
                  const ticks = [...(axis?.querySelectorAll(':scope > span') ?? [])].map((tick) => {
                    const rect = tick.getBoundingClientRect();
                    const percent = Number(tick.dataset.vcAxisPercent);
                    const expected = (centerRect?.left ?? 0) + ((centerRect?.width ?? 0) * percent) / 100;
                    return {
                      text: tick.textContent?.trim() ?? '',
                      percent,
                      actual: rect.left + rect.width / 2,
                      expected,
                      error: Math.abs(rect.left + rect.width / 2 - expected),
                    };
                  });
                  return {
                    axisLeft: axisRect?.left ?? 0,
                    centerLeft: centerRect?.left ?? 0,
                    centerWidth: centerRect?.width ?? 0,
                    ticks,
                  };
                });

                expect(axisMetrics.centerLeft).toBeGreaterThan(axisMetrics.axisLeft);
                expect(axisMetrics.ticks.length).toBeGreaterThan(2);
                expect(axisMetrics.ticks.every(({ percent, error }) => Number.isFinite(percent) && error <= 2)).toBe(true);

                const pathfinder = page.locator('.vis-item.vc-timeline-item', { hasText: 'The Pathfinder Exodus' }).first();
                await expect(pathfinder).toBeAttached();
                const scrollMetrics = await scrollItemIntoTimelineViewport(pathfinder);
                expect(scrollMetrics).not.toBeNull();
                expect(scrollMetrics.scrollHeight).toBeGreaterThan(scrollMetrics.clientHeight);
                await expect.poll(() => pathfinder.evaluate((item) => {
                  const canvas = item.closest('[data-vc-canvas]');
                  if (!canvas) return false;
                  const canvasRect = canvas.getBoundingClientRect();
                  const itemRect = item.getBoundingClientRect();
                  return itemRect.top >= canvasRect.top && itemRect.bottom <= canvasRect.bottom;
                })).toBe(true);

                await page.evaluate(() => {
                  document.documentElement.dataset.theme = 'dark';
                });
                await pathfinder.hover();
                await page.waitForTimeout(800);

                const tooltipMetrics = await page.evaluate(() => {
                  const item = [...document.querySelectorAll('.vis-item.vc-timeline-item')]
                    .find((element) => element.textContent?.includes('The Pathfinder Exodus'));
                  const visibleTooltips = [...document.querySelectorAll('body > .vc-timeline-hovercard.is-canonical')]
                    .filter((element) => {
                      const style = getComputedStyle(element);
                      const rect = element.getBoundingClientRect();
                      return style.display !== 'none' && style.visibility !== 'hidden' && rect.width > 0 && rect.height > 0;
                    });
                  const tooltip = visibleTooltips[0];
                  const style = tooltip ? getComputedStyle(tooltip) : null;
                  return {
                    itemTitle: item?.getAttribute('title') ?? null,
                    tooltipCount: visibleTooltips.length,
                    tooltipText: visibleTooltips.map((element) => element.textContent ?? '').join(' '),
                    tooltipEventId: tooltip?.dataset.vcCanonicalEventId ?? null,
                    backgroundColor: style?.backgroundColor ?? null,
                    color: style?.color ?? null,
                  };
                });

                writeFileSync(
                  'timeline-browser-diagnostics/entropy-axis-tooltip.json',
                  JSON.stringify({ axisMetrics, scrollMetrics, tooltipMetrics }, null, 2),
                );
                await page.screenshot({ path: 'timeline-browser-diagnostics/entropy-axis-tooltip.png', fullPage: true });

                expect(tooltipMetrics.itemTitle).toBeNull();
                expect(tooltipMetrics.tooltipCount).toBe(1);
                expect(tooltipMetrics.tooltipText).toContain('11,431');
                expect(tooltipMetrics.tooltipText).toContain('The Pathfinder Exodus');
                expect(tooltipMetrics.tooltipText).not.toMatch(/2030|2036/);
                expect(tooltipMetrics.tooltipEventId).toBeTruthy();
                expect(tooltipMetrics.backgroundColor).toMatch(/21,\s*19,\s*16/);
                expect(tooltipMetrics.color).toMatch(/244,\s*239,\s*229/);
              }

              const diagnostics = await page.evaluate(() => {
                const islands = [...document.querySelectorAll('astro-island')].map((island) => ({
                  ssr: island.getAttribute('ssr'),
                  componentUrl: island.getAttribute('component-url'),
                  rendererUrl: island.getAttribute('renderer-url'),
                  client: island.getAttribute('client'),
                  propsLength: island.getAttribute('props')?.length ?? 0,
                  hasTimeline: Boolean(island.querySelector('[data-vc-timeline-island]')),
                  innerHtmlStart: island.innerHTML.slice(0, 1_500),
                }));
                const mount = document.querySelector('[data-vc-timeline-mount]');
                const fallback = document.querySelector('[data-vc-fallback]');
                return {
                  href: window.location.href,
                  readyState: document.readyState,
                  islands,
                  mountedCount: document.querySelectorAll('[data-vc-island-mounted="true"]').length,
                  canvasCount: document.querySelectorAll('[data-vc-canvas]').length,
                  mountHtml: mount?.innerHTML.slice(0, 2_000) ?? null,
                  fallbackHidden: fallback?.hidden ?? null,
                };
              });

              writeFileSync(
                `timeline-browser-diagnostics/${era}.json`,
                JSON.stringify({ browserMessages, diagnostics }, null, 2),
              );
              await page.screenshot({ path: `timeline-browser-diagnostics/${era}.png`, fullPage: true });

              expect(browserMessages.filter((entry) => entry.startsWith('pageerror:'))).toEqual([]);
              expect(browserMessages.filter((entry) => entry.includes('failed to mount'))).toEqual([]);
            });
          }
          TEST
          npx playwright test tests/browser/timeline-smoke.spec.mjs --reporter=line --workers=1
      - name: Show Astro preview log
        if: always()
        run: cat /tmp/viscerium-preview.log || true
      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: timeline-browser-smoke
          path: |
            Site/timeline-browser-diagnostics
            Site/test-results
          if-no-files-found: ignore
