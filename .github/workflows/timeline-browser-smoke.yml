name: Timeline browser smoke

on:
  push:
    branches:
      - codex/timeline-controls-lifecycle
  pull_request:
    paths:
      - 'Site/src/components/timeline/**'
      - 'Site/src/lib/timeline/**'
      - 'Site/src/styles/**'
      - 'Site/src/data/timelines/**'
      - 'Site/tests/browser/**'
      - 'Site/package.json'
      - 'Site/package-lock.json'
      - 'Site/astro.config.mjs'
      - '.github/workflows/timeline-browser-smoke.yml'

permissions:
  contents: read

jobs:
  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: Site
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Site/package-lock.json
      - name: Install project dependencies
        run: npm ci --silent --no-audit --no-fund
      - name: Build static Codex
        run: npm run build
      - name: Install browser test runtime
        run: |
          npm install --no-save --package-lock=false --legacy-peer-deps --no-audit --no-fund @playwright/test@1.55.0
          npx --no-install playwright install chromium
      - name: Start Astro preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4321 > /tmp/viscerium-preview.log 2>&1 &
          echo $! > /tmp/viscerium-preview.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4321/eras/citadel/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/viscerium-preview.log
          exit 1
      - name: Run timeline browser smoke tests
        shell: bash
        run: |
          mkdir -p timeline-browser-diagnostics
          set -o pipefail
          npx --no-install playwright test tests/browser/timeline-*.spec.mjs --reporter=line --workers=1 2>&1 \
            | tee timeline-browser-diagnostics/playwright.log
      - name: Show Astro preview log
        if: always()
        run: cat /tmp/viscerium-preview.log || true
      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: timeline-browser-smoke
          path: |
            Site/timeline-browser-diagnostics
            Site/test-results
          if-no-files-found: ignore
          retention-days: 7
