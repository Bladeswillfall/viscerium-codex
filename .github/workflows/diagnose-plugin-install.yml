name: Diagnose plugin install

on:
  push:
    branches:
      - cleanup/reduce-custom-tools-and-deps
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install plugin dependencies
        id: install
        continue-on-error: true
        working-directory: Tools/obsidian-viscerium-timelines
        shell: bash
        run: npm install --package-lock=false --no-audit --no-fund > plugin-install.log 2>&1
      - name: Upload install log
        uses: actions/upload-artifact@v4
        with:
          name: plugin-install-log
          path: Tools/obsidian-viscerium-timelines/plugin-install.log
          retention-days: 1
      - name: Preserve failure status
        if: steps.install.outcome == 'failure'
        run: exit 1

