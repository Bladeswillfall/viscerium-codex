name: Refresh compression lockfile

on:
  push:
    branches:
      - feat/playform-compress
    paths:
      - Site/package.json

permissions:
  contents: write

jobs:
  refresh-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Refresh npm lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
        working-directory: Site
      - name: Commit refreshed lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Site/package-lock.json
          git diff --cached --quiet || git commit -m "chore: align Sharp versions in Site lockfile"
          git push
