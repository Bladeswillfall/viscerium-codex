name: Update Chronos lockfile

on:
  push:
    branches:
      - codex/viscerium-timeline-system

permissions:
  contents: write

jobs:
  lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: codex/viscerium-timeline-system

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Repair Chronos documentation text
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          timelines = Path('Site/TIMELINES.md')
          text = timelines.read_text()
          text = text.replace('```chronos fenced block in a Vault note', 'chronos fenced block in a Vault note')
          timelines.write_text(text)

          publishing = Path('Vault/System/Publishing Rules.md')
          text = publishing.read_text()
          old = 'Do not put raw `dataviewjs` or hand-authored Chronos blocks into public canon examples. Generated datasets and the VISCERIUM shortcode model are the supported timeline path.'
          new = 'Do not publish raw `dataviewjs`. Native fenced `chronos` blocks are supported for note-local editorial timelines and pass through to Starlight. Use canonical event notes and `[Timeline:...]` shortcodes when entries must participate in registered calendars, era validation and generated datasets.'
          if old not in text:
              raise SystemExit('Expected publishing-rule text was not found')
          publishing.write_text(text.replace(old, new))
          PY

      - name: Refresh package lock
        working-directory: Site
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit generated changes
        shell: bash
        run: |
          if git diff --quiet -- Site/package-lock.json Site/TIMELINES.md "Vault/System/Publishing Rules.md"; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Site/package-lock.json Site/TIMELINES.md "Vault/System/Publishing Rules.md"
          git commit -m "Update Chronos lockfile and guidance"
          git push origin HEAD:codex/viscerium-timeline-system
