name: Update Chronos lockfile

on:
  push:
    branches:
      - codex/viscerium-timeline-system
    paths:
      - Site/package.json
      - .github/workflows/update-chronos-lock.yml

permissions:
  contents: write

jobs:
  lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: codex/viscerium-timeline-system

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: Site/package-lock.json

      - name: Refresh package lock
        working-directory: Site
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit package lock
        shell: bash
        run: |
          if git diff --quiet -- Site/package-lock.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Site/package-lock.json
          git commit -m "Update lockfile for Chronos"
          git push origin HEAD:codex/viscerium-timeline-system
