name: Validate source compression

on:
  pull_request:
    paths:
      - .github/workflows/validate-source-compression.yml
      - Site/astro.config.mjs
      - Site/package.json
      - Site/package-lock.json
      - Site/scripts/compress-source-assets.mjs

permissions:
  contents: read

jobs:
  compress-source-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Site/package-lock.json
      - name: Install project dependencies
        id: install
        continue-on-error: true
        run: npm ci --no-audit --no-fund > npm-ci.log 2>&1
        working-directory: Site
      - name: Upload npm diagnostic
        if: steps.install.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-ci-diagnostic
          path: Site/npm-ci.log
          retention-days: 1
      - name: Stop after install failure
        if: steps.install.outcome == 'failure'
        run: exit 1
      - run: npm run compress:assets
        working-directory: Site
