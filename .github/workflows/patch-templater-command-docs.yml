name: Patch Templater command docs

on:
  push:
    branches: [fix/home-quick-actions-templater]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true

      - name: Align documented Templater palette names
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              'Templater: Create New Story Entity': 'Templater: Create Databases/New Story Entity',
              'Templater: Create New Lore Entity': 'Templater: Create Lore/New Lore Entity',
              'Templater: Create New Myrkild Unit': 'Templater: Create Databases/New Myrkild Unit',
          }

          touched = []
          for path in Path('Vault').rglob('*.md'):
              text = path.read_text(encoding='utf-8')
              updated = text
              for before, after in replacements.items():
                  updated = updated.replace(before, after)
              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  touched.append(str(path))

          plugins = Path('Vault/System/Recommended Plugins.md')
          text = plugins.read_text(encoding='utf-8')
          before = 'registers a direct **Create New Story Entity** command'
          after = 'registers direct template-specific create commands for the guided creator templates'
          if before in text:
              text = text.replace(before, after)
              plugins.write_text(text, encoding='utf-8')
              if str(plugins) not in touched:
                  touched.append(str(plugins))

          print('Updated:')
          for path in touched:
              print(path)
          PY

      - name: Commit documentation correction
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Vault
          if git diff --cached --quiet; then
            echo 'No documentation patch required.'
            exit 0
          fi
          git commit -m 'docs: align Templater creator command names'
          git push origin HEAD:fix/home-quick-actions-templater
