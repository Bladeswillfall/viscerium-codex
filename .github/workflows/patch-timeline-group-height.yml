name: Patch timeline group height

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/timeline-lane-scroll
      - name: Keep filtered lane groups at fixed height
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('Site/src/lib/timeline/chronos-native-renderer.mjs')
          text = path.read_text()
          old = "    stackSubgroups: true,\n    showCurrentTime: false,"
          new = "    stackSubgroups: true,\n    groupHeightMode: 'fixed',\n    showCurrentTime: false,"
          if text.count(old) != 1:
              raise SystemExit('Expected exactly one timeline stack option block')
          path.write_text(text.replace(old, new))
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Site/src/lib/timeline/chronos-native-renderer.mjs
          git commit -m "Keep filtered timeline lanes scrollable"
          git push origin HEAD:codex/timeline-lane-scroll
