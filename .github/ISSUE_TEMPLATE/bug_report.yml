name: Site bug report
description: Report a rendering, layout, build, content, navigation, or technical issue on the VISCERIUM Codex.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the Codex. Use this for public, trackable issues. Do not include private lore, unreleased spoilers, credentials, or personal data.
  - type: dropdown
    id: area
    attributes:
      label: Issue area
      description: Pick the closest area so the report is easier to triage.
      options:
        - Page rendering / Markdown output
        - Layout / responsive design
        - Build / deployment
        - Navigation / sidebar
        - Search / tags / graph
        - Calendar
        - Map / timeline
        - Metadata / page sidebar
        - Feeds / changelog
        - Accessibility
        - Other
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page or URL
      description: Where did you see the issue?
      placeholder: https://codex.viscerium.co.uk/...
    validations:
      required: false
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the issue clearly. Include the broken content, visible error, or unexpected behaviour.
      placeholder: The page sidebar shows...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Give a minimal path to trigger the problem.
      value: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Device / browser details
      description: Browser, screen size, OS, device, or local build command if relevant.
      placeholder: Firefox 128, Windows 11, 1440px wide / npm run build
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: Drag images here, or paste the smallest useful log excerpt.
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: Reporter checklist
      options:
        - label: I checked that this is safe to discuss publicly.
          required: true
        - label: I searched for an existing issue before opening this one.
          required: false
        - label: I included a page URL, screenshot, or reproduction steps where possible.
          required: false