name: Site bug report
description: Report a rendering, layout, build, or technical issue on the VISCERIUM Codex.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the Codex. Use this for public, trackable technical issues. For private messages, use the contact page instead.
  - type: input
    id: page
    attributes:
      label: Page or URL
      description: Where did you see the issue?
      placeholder: https://codex.viscerium.co.uk/...
    validations:
      required: false
  - type: textarea
    id: problem
    attributes:
      label: What is broken?
      description: Describe the issue clearly.
      placeholder: The calendar overflows when...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Device / browser details
      description: Browser, screen size, OS, or anything else relevant.
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag images here if helpful.
    validations:
      required: false
